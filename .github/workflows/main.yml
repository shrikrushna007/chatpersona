name: Frontend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - uses: actions/checkout@v4

    # 2. Set up Node.js environment
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    # 3. Install dependencies (runs inside the 'client' folder)
    - name: Install dependencies
      run: npm install
      working-directory: ./client

    # 4. Run the build script to ensure it compiles correctly
    - name: Build the project
      run: npm run build
      working-directory: ./client
